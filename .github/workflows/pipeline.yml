name: pipeline

on:
  schedule:
    - cron: "17 */6 * * *" # every 6h, off the full hour to dodge the cron rush
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Fetch and dedupe only, skip database writes"
        type: boolean
        default: false

concurrency:
  group: pipeline
  cancel-in-progress: false

jobs:
  ingest:
    runs-on: ubuntu-latest
    # Enrichment shares the Groq key with the CareerRAG chat; when quota is
    # tight the 429 backoffs stretch a run past 15 minutes and the job died
    # as "cancelled" without recording its run metrics.
    timeout-minutes: 30
    defaults:
      run:
        working-directory: pipeline
    steps:
      - uses: actions/checkout@v5

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
          cache-dependency-path: pipeline/pyproject.toml

      - name: Install dependencies
        run: pip install .

      - name: Run pipeline
        env:
          SUPABASE_URL: ${{ secrets.SUPABASE_URL }}
          SUPABASE_SECRET_KEY: ${{ secrets.SUPABASE_SECRET_KEY }}
          # Whichever LLM key is set is used (Groq preferred); both optional.
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
        run: python -m pipeline.main ${{ inputs.dry_run && '--dry-run' || '' }}
